<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Magic Atlas | Mind Mirage Apps</title>

  <style>
    :root {
      --bg: #050505;
      --card: rgba(18, 18, 18, 0.78);
      --line: rgba(255, 255, 255, 0.10);
      --text: #ffffff;
      --muted: #b8b8b8;
      --soft: #7a7a7a;
      --green-bg: rgba(80, 180, 100, 0.14);
      --green: #8fff9a;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .container {
      max-width: 1120px;
      margin: 0 auto;
      padding: 36px 20px;
    }

    .back {
      color: var(--muted);
      text-decoration: none;
      font-size: 14px;
    }

    .hero {
      margin-top: 30px;
      border: 1px solid var(--line);
      border-radius: 30px;
      padding: 40px;
      background: linear-gradient(135deg, #171717, #0d0d0d);
    }

    .badge {
      display: inline-block;
      padding: 6px 12px;
      border-radius: 999px;
      background: var(--green-bg);
      color: var(--green);
      font-size: 13px;
      margin-bottom: 10px;
    }

    h1 {
      font-size: 56px;
      margin: 0;
    }

    .subtitle {
      color: var(--muted);
      margin-top: 10px;
    }

    .store-buttons img {
      height: 50px;
      margin-right: 10px;
      margin-top: 15px;
    }

    .section {
      margin-top: 60px;
    }

    .screenshots {
      display: flex;
      gap: 18px;
      overflow-x: auto;
    }

    .screenshot {
      min-width: 220px;
      height: 440px;
      border-radius: 30px;
      object-fit: cover;
      border: 1px solid var(--line);
    }

    .placeholder {
      min-width: 220px;
      height: 440px;
      border-radius: 30px;
      background: #121212;
      border: 1px solid var(--line);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #666;
    }

    .footer {
      margin-top: 80px;
      text-align: center;
      color: #666;
    }

    .footer a {
      color: #888;
      margin: 0 10px;
      text-decoration: none;
    }
  </style>
</head>

<body>
  <div class="container">

    <a class="back" href="/">← Back</a>

    <section class="hero">
      <span class="badge">iOS & Android v1.2 Available</span>
      <h1>Magic Atlas</h1>
      <p class="subtitle">Learn real magic through structured lessons and progression.</p>

      <div class="store-buttons">
        <a href="https://apps.apple.com/gb/app/magic-atlas/id6759013198" target="_blank">
          <img src="https://developer.apple.com/assets/elements/badges/download-on-the-app-store.svg">
        </a>
        <a href="https://play.google.com/store/apps/details?id=com.mindmirage.magicatlas&pcampaignid=web_share" target="_blank">
          <img src="https://upload.wikimedia.org/wikipedia/commons/7/78/Google_Play_Store_badge_EN.svg">
        </a>
      </div>
    </section>

    <section class="section">
      <h2>App Preview</h2>

      <div class="screenshots">

        <!-- REAL IMAGE -->
        <img class="screenshot" src="/apps/magic-atlas/images/todayscreen.jpg" alt="Today screen">

        <!-- PLACEHOLDERS -->
        <div class="placeholder">Lessons</div>
        <div class="placeholder">Technique</div>
        <div class="placeholder">Vault</div>
        <div class="placeholder">Profile</div>

      </div>
    </section>

    <div class="footer">
      <a href="/about/">About</a>
      <a href="/legal/privacy/">Privacy</a>
      <a href="/legal/terms/">Terms</a>
    </div>

  </div>
</body>
</html>
