<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Mind Mirage Apps</title>

  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0b0b0b;
      color: #ffffff;
    }

    .container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 40px 20px;
    }

    .hero {
      text-align: center;
      margin-top: 60px;
    }

    .hero h1 {
      font-size: 42px;
      margin-bottom: 10px;
      font-weight: 600;
    }

    .hero p {
      font-size: 18px;
      color: #aaa;
    }

    .section {
      margin-top: 80px;
    }

    .section h2 {
      font-size: 24px;
      margin-bottom: 20px;
      font-weight: 500;
    }

    .app-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 20px;
    }

    .app-card {
      background: #161616;
      border-radius: 16px;
      padding: 20px;
      cursor: default;
      border: 1px solid #222;
    }

    .app-card h3 {
      margin: 0;
      font-size: 20px;
    }

    .app-card p {
      margin-top: 8px;
      color: #aaa;
    }

    .footer {
      margin-top: 100px;
      text-align: center;
      font-size: 14px;
      color: #666;
    }

    .footer a {
      color: #888;
      text-decoration: none;
      margin: 0 10px;
    }

    .footer a:hover {
      color: #fff;
    }
  </style>
</head>

<body>
  <div class="container">

    <!-- HERO -->
    <div class="hero">
      <h1>Mind Mirage Apps</h1>
      <p>Immersive mobile apps. Built for experience.</p>
    </div>

    <!-- APPS SECTION -->
    <div class="section">
      <h2>Our Apps</h2>

      <div class="app-grid">

        <!-- EMPTY STATE -->
        <div class="app-card">
          <h3>Apps coming soon</h3>
          <p>We’re preparing our first releases. Check back soon.</p>
        </div>

      </div>
    </div>

    <!-- FOOTER -->
    <div class="footer">
      <a href="/legal/privacy/">Privacy Policy</a>
      <a href="/legal/terms/">Terms</a>
    </div>

  </div>
</body>
</html>
